<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa de pous · Instalacions JFA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

:root{
  --bg:#EEF2F1;
  --surface:#FFFFFF;
  --ink:#10242B;
  --ink-soft:#56686D;
  --line:#DCE4E2;
  --accent:#0E7C86;
  --accent-dark:#0A5F67;
  --ok:#1F8A4C;
  --warn:#B7791F;
  --danger:#B3261E;
  --info:#2563AF;
  --radius:10px;
  --radius-sm:7px;
  --shadow:0 1px 2px rgba(16,36,43,0.06),0 6px 16px rgba(16,36,43,0.06);
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}

*{box-sizing:border-box;}

html,body{height:100%;margin:0;}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  display:flex;
  flex-direction:column;
}

.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--line);
  z-index:1000;
}

.topbar-inner{
  max-width:1100px;
  margin:auto;
  padding:12px 20px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:baseline;
  gap:8px;
  margin-right:auto;
}

.brand-mark{
  font-family:var(--mono);
  font-weight:600;
  font-size:14px;
  letter-spacing:0.06em;
  background:var(--ink);
  color:var(--surface);
  padding:3px 7px;
  border-radius:5px;
}

.brand-name{
  font-weight:600;
  font-size:15px;
  color:var(--ink-soft);
}

.app-switch{
  display:flex;
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:999px;
  padding:3px;
  gap:2px;
}

.app-tab{
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  padding:7px 14px;
  border-radius:999px;
  color:var(--ink-soft);
}

.app-tab.activa{
  background:var(--ink);
  color:var(--surface);
}

.btn{
  font-family:var(--sans);
  font-size:13px;
  font-weight:600;
  padding:8px 14px;
  border-radius:var(--radius-sm);
  border:1px solid var(--line);
  background:var(--surface);
  color:var(--ink);
  cursor:pointer;
}

.btn:hover{border-color:#9fb0ad;}

.llegenda{
  display:flex;
  gap:14px;
  align-items:center;
  padding:10px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  font-size:12.5px;
  color:var(--ink-soft);
  flex-wrap:wrap;
}

.llegenda-item{display:flex;align-items:center;gap:6px;}

.dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

#mapa{
  flex:1;
  width:100%;
}

.estat{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  background:var(--ink);
  color:var(--surface);
  padding:8px 16px;
  border-radius:999px;
  font-size:13px;
  z-index:2000;
  box-shadow:var(--shadow);
  display:none;
}

.popup-codigo{font-family:var(--mono);font-weight:600;font-size:14px;}
.popup-estat{font-size:12.5px;color:var(--ink-soft);margin:4px 0 8px;}
.popup-link{
  display:inline-block;
  font-size:12.5px;
  font-weight:600;
  color:var(--accent);
  text-decoration:none;
}

</style>

</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-mark">JFA</span>
      <span class="brand-name">Instalacions</span>
    </div>
    <nav class="app-switch">
      <a class="app-tab" href="./">Inventari</a>
      <a class="app-tab activa" href="./mapa.html">Mapa</a>
    </nav>
    <button class="btn" onclick="carregarPunts()">🔄 Actualitzar</button>
  </div>
</header>

<div class="llegenda">
  <div class="llegenda-item"><span class="dot" style="background:#388e3c"></span> Nivell (remesa 1)</div>
  <div class="llegenda-item"><span class="dot" style="background:#7b1fa2"></span> LILA (remesa 2)</div>
  <div class="llegenda-item"><span class="dot" style="background:#1976d2"></span> BLAUS (remesa 3)</div>
  <div class="llegenda-item"><span class="dot" style="background:#f57c00"></span> Nitrats</div>
  <div class="llegenda-item"><span class="dot" style="background:#f9a825"></span> Instal·lat / acabat</div>
  <div class="llegenda-item"><span class="dot" style="background:#d32f2f"></span> Problemàtic</div>
  <div id="contador" style="margin-left:auto;font-family:var(--mono);"></div>
</div>

<div id="mapa"></div>
<div id="estat" class="estat"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzz8jwBBYvxLJBdYlf6OrTzPBKK_ojTu4D5w2LZsxVMksLo3-WBk6EUFIFBEWTEVBKNzA/exec";

let mapa;
let capaMarcadors;

function inicialitzarMapa(){
  mapa = L.map('mapa').setView([39.6, 2.9], 9); // centrat a Mallorca

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(mapa);

  capaMarcadors = L.layerGroup().addTo(mapa);
}

function mostrarEstat(texto){
  const el = document.getElementById("estat");
  if(!texto){
    el.style.display = "none";
    return;
  }
  el.textContent = texto;
  el.style.display = "block";
}

async function carregarPunts(){

  mostrarEstat("Carregant punts…");

  try{

    const r = await fetch(API + "?accion=mapaJson");
    const dades = await r.json();

    if(!dades.ok){
      mostrarEstat("Error carregant les dades");
      return;
    }

    capaMarcadors.clearLayers();

    const bounds = [];

    dades.puntos.forEach(p => {

      const lat = Number(p.lat);
      const lon = Number(p.lon);

      if(!lat || !lon) return;

      const marcador = L.circleMarker([lat, lon], {
        radius: 7,
        color: "#ffffff",
        weight: 1.5,
        fillColor: p.color,
        fillOpacity: 0.95
      });

      const urlMaps = "https://www.google.com/maps/dir/?api=1&destination=" + lat + "," + lon;

      marcador.bindPopup(
        `<div class="popup-codigo">${escapeHtml(p.codigo)}</div>` +
        `<div class="popup-estat">${escapeHtml(p.estado || "-")}</div>` +
        `<a class="popup-link" href="${urlMaps}" target="_blank" rel="noopener">📍 Com arribar-hi</a>`
      );

      marcador.addTo(capaMarcadors);
      bounds.push([lat, lon]);
    });

    document.getElementById("contador").textContent = dades.puntos.length + " pous";

    if(bounds.length){
      mapa.fitBounds(bounds, { padding: [30,30] });
    }

    mostrarEstat("");

  }catch(error){
    console.error(error);
    mostrarEstat("Error de comunicació");
  }

}

function escapeHtml(valor){
  return String(valor ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

inicialitzarMapa();
carregarPunts();

// Se refresca solo cada 5 minutos por si lo dejas abierto en una pantalla
setInterval(carregarPunts, 5 * 60 * 1000);

</script>

</body>
</html>
