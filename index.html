<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestión LoRaWAN</title>
  
<script src="https://unpkg.com/html5-qrcode"></script>
  
<style>

body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:15px;
font-size:20px;
box-sizing:border-box;
}

button{
padding:12px;
font-size:16px;
cursor:pointer;
margin:4px;
}

#resultado{
margin-top:20px;
padding:20px;
border:1px solid #ccc;
border-radius:8px;
}

.equipo{
padding:10px;
border-bottom:1px solid #eee;
}

.stats{
padding:15px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:15px;
}

.almacen{
color:green;
font-weight:bold;
}

.retirado{
color:orange;
font-weight:bold;
}

.instalado{
color:blue;
font-weight:bold;
}

.averia{
color:red;
font-weight:bold;
}

.acciones{
margin-top:20px;
}

</style>

</head>

<body>

<h2>Gestión Emisores LoRaWAN</h2>
  <div style="margin-bottom:15px;">
    <button id="btnAdmin" onclick="loginAdmin()">
        🔓 Modo consulta
    </button>
</div>

<div id="stats" class="stats">
Cargando inventario...
</div>

<input
id="busqueda"
placeholder="Código, DevEUI o Caja"
onkeydown="if(event.key==='Enter') buscar()"
>

<button onclick="buscar()">Buscar</button>


<button onclick="seleccionarCamara()">
⚙️ Seleccionar cámara
</button>

<div id="scannerModal"
     style="
       display:none;
       position:fixed;
       top:0;
       left:0;
       width:100%;
       height:100%;
       background:rgba(0,0,0,0.8);
       z-index:9999;
     ">

  <div
    style="
      max-width:500px;
      margin:30px auto;
      background:white;
      padding:15px;
      border-radius:10px;
      text-align:center;
    ">

    <h3>Escanear código</h3>

    <div id="scanner"></div>

    <br>

    <button onclick="cerrarEscaner()">
      ❌ Cerrar
    </button>

  </div>

</div>
  
<div id="resultado"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzz8jwBBYvxLJBdYlf6OrTzPBKK_ojTu4D5w2LZsxVMksLo3-WBk6EUFIFBEWTEVBKNzA/exec";

let equipos = [];
const PASSWORD = "JFA2026";

let admin =
localStorage.getItem("admin") === "si";
  
window.onload = async () => {

    actualizarModoAdmin();

    const r = await fetch(API);

    equipos = await r.json();

    actualizarStats();

    const codigo =
      location.hash
      .replace("#","")
      .toUpperCase();

    if(codigo){

      document.getElementById(
        "busqueda"
      ).value = codigo;

      buscar();

    }

};

function actualizarStats(){

const almacen =
equipos.filter(e=>e.estado==="Almacén").length;

const retirado =
equipos.filter(e=>e.estado==="Retirado").length;

const instalado =
equipos.filter(e=>e.estado==="Instalado").length;

const averia =
equipos.filter(e=>e.estado==="Avería").length;

document.getElementById("stats").innerHTML =

`
<b>Total:</b> ${equipos.length}
<br><br>

🟢 Almacén: ${almacen}
<br>

🟠 Retirado: ${retirado}
<br>

🔵 Instalado: ${instalado}
<br>

🔴 Avería: ${averia}
`;

}

function claseEstado(estado){

if(estado==="Almacén") return "almacen";
if(estado==="Retirado") return "retirado";
if(estado==="Instalado") return "instalado";
if(estado==="Avería") return "averia";

return "";

}

async function buscar(){

const valor =
document.getElementById("busqueda")
.value
.trim()
.toUpperCase();

if(!valor) return;

// Buscar código o DevEUI localmente

const equipo = equipos.find(e =>

String(e.codigo || "").toUpperCase() === valor ||

String(e.deveui || "").toUpperCase() === valor

);

if(equipo){

mostrarEquipo(equipo);

return;

}

// Buscar caja en Apps Script

try{

const r =
await fetch(
API + "?q=" + encodeURIComponent(valor)
);

const datos =
await r.json();

if(datos.tipo === "caja"){

mostrarCaja(
datos.caja,
datos.equipos
);

return;

}

}catch(error){

console.error(error);

}

document.getElementById("resultado").innerHTML =
"<h3>No encontrado</h3>";

}

function mostrarCaja(caja,lista){

let html =

`
<h3>📦 Caja ${caja}</h3>

<p>Total equipos: <b>${lista.length}</b></p>
`;

lista.forEach(e=>{

html +=

`
<div class="equipo">

<b>${e.codigo}</b>

<br>

${e.deveui}

<br>

<span class="${claseEstado(e.estado)}">
${e.estado || "-"}
</span>

</div>
`;

});

document.getElementById("resultado").innerHTML =
html;

}

function mostrarEquipo(equipo){

    window.location.hash =
  equipo.codigo.toUpperCase();
  
document.getElementById("resultado").innerHTML =

`
<h3>Equipo</h3>

<p><b>Código:</b> ${equipo.codigo}</p>

<p><b>DevEUI:</b> ${equipo.deveui}</p>

<p style="font-size:28px">
📦 Caja ${equipo.caja}
</p>

<p>
<b>Tipo sonda:</b>
${equipo.tipoSonda || "-"}
</p>

<p>
<b>Metraje:</b>
${equipo.metraje || "-"} m
</p>

<p>

<b>Estado:</b>

<span class="${claseEstado(equipo.estado)}">
${equipo.estado || "-"}
</span>

</p>

<p>
<b>Fecha:</b>
${equipo.fecha || "-"}
</p>

<p>
<b>Usuario:</b>
${equipo.usuario || "-"}
</p>

<p>
<b>Serie sonda:</b>
${equipo.serieSonda || "No asignada"}
</p>

${admin ? `

<div class="acciones">

<button onclick="cambiarEstado('${equipo.codigo}','retirar')">
Retirar
</button>

<button onclick="cambiarEstado('${equipo.codigo}','instalado')">
Instalar
</button>

<button onclick="cambiarEstado('${equipo.codigo}','averia')">
Avería
</button>

<button onclick="cambiarEstado('${equipo.codigo}','almacen')">
Almacén
</button>

<button onclick="asignarSerieSonda('${equipo.codigo}')">
✏️ Manual
</button>

<button onclick="escanearSerieSonda('${equipo.codigo}')">
📷 Escanear
</button>

</div>

` : ""}

`;

}

  function loginAdmin(){

if(admin){

admin = false;

localStorage.removeItem("admin");

actualizarModoAdmin();

return;

}

const pass =
prompt("Contraseña administrador:");

if(pass === PASSWORD){

admin = true;

localStorage.setItem("admin","si");

actualizarModoAdmin();

alert("Modo administrador activado");

}else{

alert("Contraseña incorrecta");

}

}

function actualizarModoAdmin(){

const btn =
document.getElementById("btnAdmin");

if(admin){

btn.innerHTML =
"🔒 Modo administrador";

}else{

btn.innerHTML =
"🔓 Modo consulta";

}

}

  async function asignarSerieSonda(codigo){

  const equipo =
    equipos.find(e => e.codigo === codigo);

  if(!equipo) return;

  const serie =
    prompt(
      "Número de serie de la sonda:",
      equipo.serieSonda || ""
    );

  if(
    serie === null ||
    serie.trim() === ""
  ) return;

  const url =
    API +
    "?accion=serieSonda" +
    "&fila=" + encodeURIComponent(equipo.fila) +
    "&serie=" + encodeURIComponent(serie);

  try{

    const r =
      await fetch(url);

    const respuesta =
      await r.text();

    if(respuesta === "OK"){

      equipo.serieSonda = serie;

      mostrarEquipo(equipo);

      alert("Serie guardada");

    }else{

      alert("Error: " + respuesta);

    }

  }catch(error){

    console.error(error);

    alert("Error de comunicación");

  }

}

async function escanearSerieSonda(codigo){

  const equipo =
    equipos.find(
      e => e.codigo === codigo
    );

  if(!equipo) return;

  document.getElementById(
    "scannerModal"
  ).style.display = "block";

  const html5QrCode =
    new Html5Qrcode("scanner");

  const cameraId =
    localStorage.getItem("cameraId");

  try{

    await html5QrCode.start(

      cameraId || {
        facingMode:"environment"
      },

      {
        fps:10,
        qrbox:250
      },

      async (decodedText)=>{

  if(decodedText.length !== 7){
    return;
  }

  const confirmar =
    confirm(
      "¿Guardar esta serie?\n\n" +
      decodedText
    );

  if(!confirmar){
    return;
  }

  await html5QrCode.stop();

  document.getElementById(
    "scannerModal"
  ).style.display = "none";

  const url =
    API +
    "?accion=serieSonda" +
    "&fila=" + encodeURIComponent(equipo.fila) +
    "&serie=" + encodeURIComponent(decodedText);

        const r =
          await fetch(url);

        const respuesta =
          await r.text();

        if(respuesta === "OK"){

          equipo.serieSonda =
            decodedText;

          mostrarEquipo(equipo);

          alert(
            "Serie guardada:\n\n" +
            decodedText
          );

        }else{

          alert(
            "Error: " +
            respuesta
          );

        }

      }

    );

  }catch(error){

    console.error(error);

    alert(
      "Error iniciando cámara"
    );

  }

}

async function seleccionarCamara(){

  const cameras =
    await Html5Qrcode.getCameras();

  let texto =
    "Cámaras disponibles:\n\n";

  cameras.forEach((c,i)=>{
    texto +=
      (i+1) +
      ". " +
      (c.label || ("Cámara " + (i+1))) +
      "\n";
  });

  const seleccion =
    prompt(
      texto +
      "\nNúmero de cámara:"
    );

  if(!seleccion) return;

  const idx =
    Number(seleccion) - 1;

  if(cameras[idx]){

    localStorage.setItem(
      "cameraId",
      cameras[idx].id
    );

    alert(
      "Cámara guardada"
    );

  }

}

function cerrarEscaner(){

  document.getElementById(
    "scannerModal"
  ).style.display = "none";

}
async function cambiarEstado(codigo,accion){

const equipo =
equipos.find(e=>e.codigo===codigo);

if(!equipo) return;

const usuario =
prompt("Usuario:");

if(usuario===null) return;

const url =
API +
"?accion=" + encodeURIComponent(accion) +
"&fila=" + encodeURIComponent(equipo.fila) +
"&codigo=" + encodeURIComponent(equipo.codigo) +
"&deveui=" + encodeURIComponent(equipo.deveui) +
"&usuario=" + encodeURIComponent(usuario);

try{

const r = await fetch(url);

const respuesta =
await r.text();

if(respuesta==="OK"){

if(accion==="retirar")
equipo.estado="Retirado";

if(accion==="instalado")
equipo.estado="Instalado";

if(accion==="averia")
equipo.estado="Avería";

if(accion==="almacen")
equipo.estado="Almacén";

if(accion==="almacen"){

equipo.fecha="";
equipo.usuario="";

}else{

equipo.usuario=usuario;
equipo.fecha=new Date().toLocaleString();

}

actualizarStats();

mostrarEquipo(equipo);

alert("Actualizado correctamente");

}else{

alert("Error: " + respuesta);

}

}catch(error){

console.error(error);

alert("Error de comunicación");

}

}

</script>

</body>
</html>
